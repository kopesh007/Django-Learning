
{% extends "base.html"%}

{% block content%}

{% if post%}
    <div class="container-fluid ">
       
        <div class="row">
            <div class="col-lg-8">
              

              <h1 class="mb-4">{{post.title}}</h1>
              <p class="text-muted">{{post.data}}</p>
              <img src="{{post.image}}" class="img-fluid mb-4" alt="Blog Image">
              <p>{{post.content}}</p>
            </div>
            <div class="col-lg-4">
              <div class="card mt-3">
                <div class="card-body">
                  <h5 class="card-title">Related Posts</h5>
                  <ul class="list-unstyled">
                    {% for i in related %}
                    <li><a href="{% url "blog:detail" sl=i.slug%}">{{i.title}}</a></li>
                    {% endfor %}
                  </ul>
                </div>
              </div>
            </div>
        </div>
    </div>
  {% else %}
  <h1>Post Doesn't Exist</h1>
  {% endif %}
   
{% endblock %}
